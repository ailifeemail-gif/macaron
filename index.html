<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Макарони ручної роботи</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body { overflow-x: hidden; }
  </style>
</head>
<body>

  <!-- Блок 1 -->
  <div id="dmhRoot" class="dmh-root">
  <header class="dmh-header" id="dmhHeader">
    <div class="dmh-inner">

      <a class="dmh-logo" id="dmhLogoLink" href="#">
        <img class="dmh-logo-img" id="dmhLogoImg" src="" alt="" />
        <span class="dmh-logo-text" id="dmhLogoText"></span>
      </a>

      <nav class="dmh-nav" id="dmhNav"></nav>

      <div class="dmh-right">
        <a class="dmh-btn" id="dmhBtn" target="_blank" rel="noopener"></a>
        <button class="dmh-burger" id="dmhBurger" aria-label="Меню" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </header>
  <div class="dmh-spacer" id="dmhSpacer" aria-hidden="true"></div>

  <div class="dmh-overlay" id="dmhOverlay">
    <nav class="dmh-overlay-nav" id="dmhOverlayNav"></nav>
    <a class="dmh-overlay-btn" id="dmhOverlayBtn" target="_blank" rel="noopener"></a>
  </div>
</div>

<style>
  html{ scroll-behavior:smooth; scroll-padding-top:100px; } /* ДОДАНО: плавний скрол + відступ, щоб фіксована шапка не закривала заголовок розділу при переході по якорю */

  #dmhRoot{
    --dmh-bg:#f8efe6ee;
    --dmh-text:#332420;
    --dmh-text-muted:#7a675f;
    --dmh-accent:#a4506c;
    --dmh-btn-bg:#332420;
    --dmh-btn-text:#fbf3ec;
    --dmh-overlay-bg:#f8efe6;
    --dmh-border:rgba(51,36,32,.08);

    position:relative;
    width:100%;
    font-family:'Montserrat', Arial, sans-serif;
    box-sizing:border-box;
  }
  #dmhRoot *{ box-sizing:border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700&family=Montserrat:wght@400;500;600;700&display=swap');

  .dmh-header{
    position:fixed;              /* ЗМІНЕНО: fixed замість sticky -- гарантовано завжди видимий, незалежно від інших блоків на сторінці */
    top:0;
    left:0;
    right:0;
    z-index:500;
    width:100%;
    background: var(--dmh-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom:1px solid var(--dmh-border);
    transition: box-shadow .3s ease, padding .3s ease;
  }
  .dmh-header.dmh-scrolled{
    box-shadow: 0 8px 24px rgba(51,36,32,.08);
  }
  .dmh-spacer{
    width:100%;                  /* ДОДАНО: займає стільки ж місця, скільки шапка -- щоб контент під нею не ховався */
  }

  .dmh-inner{
    max-width:1280px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
    padding: 16px clamp(20px,5vw,50px);
  }

  .dmh-logo{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none !important;
    flex:0 0 auto;
  }
  .dmh-logo-img{
    display:block;
    width:42px;
    height:42px;
    object-fit:contain;
    border-radius:50%;
  }
  .dmh-logo-text{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:20px;
    color: var(--dmh-text) !important;
    letter-spacing:-.2px;
    white-space:nowrap;
  }

  .dmh-nav{
    display:flex;
    align-items:center;
    gap: clamp(18px,2.6vw,36px);
    flex:1 1 auto;
    justify-content:center;
  }
  .dmh-nav a{
    text-decoration:none !important;
    color: var(--dmh-text-muted) !important;
    font-size:14px;
    font-weight:500;
    letter-spacing:.2px;
    white-space:nowrap;
    position:relative;
    padding:4px 0;
    transition: color .25s ease;
  }
  .dmh-nav a::after{
    content:"";
    position:absolute;
    left:0; right:100%;
    bottom:-2px;
    height:2px;
    background: var(--dmh-accent);
    transition: right .3s ease;
  }
  .dmh-nav a:hover{ color: var(--dmh-text) !important; }
  .dmh-nav a:hover::after{ right:0; }

  .dmh-right{
    display:flex;
    align-items:center;
    gap:14px;
    flex:0 0 auto;
  }

  .dmh-btn{
    display:inline-flex;
    align-items:center;
    padding:11px 24px;
    border-radius:40px;
    background: var(--dmh-btn-bg);
    color: var(--dmh-btn-text) !important;
    font-size:13px;
    font-weight:600;
    letter-spacing:.2px;
    text-decoration:none !important;
    box-shadow: 0 10px 20px rgba(51,36,32,.18);
    transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s ease;
    white-space:nowrap;
  }
  .dmh-btn:hover{ transform: translateY(-2px); box-shadow: 0 14px 26px rgba(51,36,32,.26); }

  .dmh-burger{
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:5px;
    width:42px;
    height:42px;
    border:none;
    background:transparent;
    cursor:pointer;
    padding:0;
    flex:0 0 auto;
  }
  .dmh-burger span{
    display:block;
    width:22px;
    height:2px;
    background: var(--dmh-text);
    border-radius:2px;
    transition: transform .3s ease, opacity .3s ease;
  }
  .dmh-burger[aria-expanded="true"] span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
  .dmh-burger[aria-expanded="true"] span:nth-child(2){ opacity:0; }
  .dmh-burger[aria-expanded="true"] span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

  /* ======================================================
     МОБІЛЬНЕ МЕНЮ (overlay)
     ====================================================== */
  .dmh-overlay{
    position:fixed;
    inset:0;
    z-index:490;
    background: var(--dmh-overlay-bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:34px;
    opacity:0;
    visibility:hidden;
    transform: translateY(-8px);
    transition: opacity .35s ease, transform .35s ease, visibility 0s linear .35s;
  }
  .dmh-overlay.dmh-open{
    opacity:1;
    visibility:visible;
    transform: translateY(0);
    transition: opacity .35s ease, transform .35s ease, visibility 0s;
  }
  .dmh-overlay-nav{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .dmh-overlay-nav a{
    text-decoration:none !important;
    color: var(--dmh-text) !important;
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
  }
  .dmh-overlay-btn{
    display:inline-flex;
    align-items:center;
    padding:16px 34px;
    border-radius:40px;
    background: var(--dmh-btn-bg);
    color: var(--dmh-btn-text) !important;
    font-size:14px;
    font-weight:600;
    text-decoration:none !important;
    box-shadow: 0 14px 26px rgba(51,36,32,.2);
  }

  /* ======================================================
     АДАПТИВНІСТЬ: ПЛАНШЕТ / ТЕЛЕФОН
     ====================================================== */
  @media (max-width: 900px){
    .dmh-nav{ display:none; }
    .dmh-burger{ display:flex; }
    .dmh-btn{ display:none; }             /* кнопка переїжджає у мобільне меню, щоб в шапці не було тісно */
  }
  @media (max-width: 480px){
    .dmh-inner{ padding: 13px 16px; }
    .dmh-logo-img{ width:36px; height:36px; }
    .dmh-logo-text{ font-size:17px; }
  }

  @media (prefers-reduced-motion: reduce){
    .dmh-overlay, .dmh-burger span, .dmh-btn{ transition:none !important; }
  }
</style>

<script>
(function(){

  /* ======================================================
     CONFIG -- ЛОГОТИП, МЕНЮ, КНОПКА, КОЛЬОРИ ТУТ
     ====================================================== */
  var CONFIG = {

    colors: {
      headerBg     : "#f8efe6cc", /* ЗМІНИТИ фон шапки (останні 2 символи -- прозорість: ff=100% непрозорий, cc=80%, 99=60%, 66=40%) */
      text         : "#332420",   /* ЗМІНИТИ основний колір тексту (лого, посилання при наведенні) */
      textMuted    : "#7a675f",   /* ЗМІНИТИ колір пунктів меню */
      accent       : "#a4506c",   /* ЗМІНИТИ колір підкреслення при наведенні на пункт меню */
      btnBg        : "#332420",   /* ЗМІНИТИ фон кнопки */
      btnText      : "#fbf3ec",   /* ЗМІНИТИ колір тексту кнопки */
      overlayBg    : "#f8efe6"    /* ЗМІНИТИ фон мобільного меню (без прозорості) */
    },

    logo: {
      imageUrl : "https://i.ibb.co/zHNn56Ph/Screenshot-2026-07-11-112651.png", /* ЗМІНИТИ -- посилання на логотип (або лиши "" щоб показати тільки текст) */
      alt      : "Dr. Macaron",
      text     : "Dr. Macaron",   /* ЗМІНИТИ текст лого поруч з іконкою (можна лишити "" якщо треба тільки картинка) */
      url      : "#dmHero"        /* ЗМІНИТИ -- куди веде клік по лого (якір або посилання на головну) */
    },

    nav: [
      /* ЗМІНИТИ пункти меню: text -- назва, url -- якір розділу (#id-блоку) або зовнішнє посилання */
      { text: "Ціни",     url: "#dmpSection" },
      { text: "Наші роботи", url: "#dmgSection" },
      { text: "Відгуки",  url: "#dmrRew" },
      { text: "Контакти",  url: "#dmfFooter" }
    ],

    button: {
      text : "Замовити",   /* ЗМІНИТИ текст кнопки */
      url  : "https://www.instagram.com/dr.macaron_varshavskiy?igsh=a2t6aW03am5xbDFp" /* ЗМІНИТИ посилання кнопки */
    }
  };

  /* ====================== КІНЕЦЬ CONFIG ====================== */


  var root = document.getElementById('dmhRoot');
  if(!root) return;

  var c = CONFIG.colors;
  root.style.setProperty('--dmh-bg', c.headerBg);
  root.style.setProperty('--dmh-text', c.text);
  root.style.setProperty('--dmh-text-muted', c.textMuted);
  root.style.setProperty('--dmh-accent', c.accent);
  root.style.setProperty('--dmh-btn-bg', c.btnBg);
  root.style.setProperty('--dmh-btn-text', c.btnText);
  root.style.setProperty('--dmh-overlay-bg', c.overlayBg);

  var logo = CONFIG.logo;
  var logoImg = document.getElementById('dmhLogoImg');
  if(logo.imageUrl){
    logoImg.src = logo.imageUrl;
    logoImg.alt = logo.alt || '';
  } else {
    logoImg.style.display = 'none';
  }
  document.getElementById('dmhLogoText').textContent = logo.text || '';
  document.getElementById('dmhLogoLink').setAttribute('href', logo.url || '#');

  function buildNav(container, isOverlay){
    CONFIG.nav.forEach(function(item){
      var a = document.createElement('a');
      a.textContent = item.text;
      a.setAttribute('href', item.url);
      if(isOverlay){
        a.addEventListener('click', closeMenu);
      }
      container.appendChild(a);
    });
  }
  buildNav(document.getElementById('dmhNav'), false);
  buildNav(document.getElementById('dmhOverlayNav'), true);

  var btn = document.getElementById('dmhBtn');
  btn.textContent = CONFIG.button.text;
  btn.setAttribute('href', CONFIG.button.url);

  var overlayBtn = document.getElementById('dmhOverlayBtn');
  overlayBtn.textContent = CONFIG.button.text;
  overlayBtn.setAttribute('href', CONFIG.button.url);

  var header = document.getElementById('dmhHeader');
  var burger = document.getElementById('dmhBurger');
  var overlay = document.getElementById('dmhOverlay');
  var spacer = document.getElementById('dmhSpacer');

  function syncSpacerHeight(){
    spacer.style.height = header.offsetHeight + 'px';
  }
  syncSpacerHeight();
  window.addEventListener('resize', syncSpacerHeight);
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(syncSpacerHeight); /* висота шапки могла змінитись після довантаження шрифту Fraunces */
  }

  function openMenu(){
    overlay.classList.add('dmh-open');
    burger.setAttribute('aria-expanded', 'true');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
  }
  function closeMenu(){
    overlay.classList.remove('dmh-open');
    burger.setAttribute('aria-expanded', 'false');
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
  }
  burger.addEventListener('click', function(){
    if(overlay.classList.contains('dmh-open')){ closeMenu(); } else { openMenu(); }
  });
  overlayBtn.addEventListener('click', closeMenu);

  window.addEventListener('scroll', function(){
    if(window.scrollY > 8){ header.classList.add('dmh-scrolled'); }
    else{ header.classList.remove('dmh-scrolled'); }
  }, { passive:true });

})();
</script>

<style>
  #dmRoot{
    --dm-bg1:#f8efe6;
    --dm-bg2:#f0dfe0;
    --dm-shell:#e4a4b9;
    --dm-shell-dark:#c97e97;
    --dm-cream:#fffaf3;
    --dm-primary:#a4506c;
    --dm-accent:#9c7a4e;
    --dm-text-dark:#332420;
    --dm-text-light:#7a675f;
    --dm-btn-bg:#332420;
    --dm-btn-text:#fbf3ec;
    --dm-btn-border:#332420;
    --dm-wave1:#f2ddd0;
    --dm-wave2:#e8c8c9;
    --dm-badge-text:#9c7a4e;
 
    position:relative;
    width:100%;
    overflow:hidden;
    font-family: 'Montserrat', Arial, sans-serif;
    box-sizing:border-box;
  }
  #dmRoot *{ box-sizing:border-box; }
 
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Montserrat:wght@400;500;600&display=swap');
 
  /* ======================================================
     ІНТРО-АНІМАЦІЯ
     ====================================================== */
  .dm-intro{
    position:fixed;              /* ЗМІНЕНО: fixed замість absolute -- тепер завжди по центру ЕКРАНА, а не блоку на сторінці */
    inset:0;
    z-index:9999;                /* ЗМІНЕНО: підняли z-index, щоб перекривало решту контенту сторінки Tilda */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 50% 40%, var(--dm-bg1), var(--dm-bg2));
    transition: opacity .6s ease;
  }
  .dm-intro.dm-fade-out{ opacity:0; pointer-events:none; }
  .dm-intro.dm-hidden{ display:none; }
 
  .dm-macaron-stage{
    position:relative;
    width:clamp(150px,22vw,240px);
    height:clamp(160px,22vw,250px);
    flex:0 0 auto;
  }
 
  .dm-shell{
    position:absolute;
    left:0;
    width:100%;
    height:52%;
    background:
      radial-gradient(circle at 25% 30%, rgba(0,0,0,.16) 0 2px, transparent 2.5px) 10% 20%/22px 22px,
      radial-gradient(circle at 60% 60%, rgba(0,0,0,.14) 0 1.6px, transparent 2px) 55% 55%/26px 26px,
      radial-gradient(circle at 80% 20%, rgba(0,0,0,.13) 0 1.6px, transparent 2px) 80% 30%/24px 24px,
      radial-gradient(ellipse at 35% 15%, rgba(255,255,255,.55), transparent 55%),
      linear-gradient(180deg, var(--dm-shell), var(--dm-shell-dark));
    opacity:0;
    box-shadow: 0 14px 26px rgba(51,36,32,.16);
  }
  .dm-shell-top{
    top:0;
    border-radius: 50% 50% 6% 6% / 100% 100% 18% 18%;
    animation-name: dmShellTopIn;
    animation-timing-function: ease;
    animation-fill-mode: forwards;
  }
  .dm-shell-top::after{
    content:"";
    position:absolute;
    left:6%;
    right:6%;
    bottom:-5px;
    height:12px;
    background: repeating-radial-gradient(circle at 0 0, var(--dm-shell-dark) 0 3px, transparent 3px 15px);
    opacity:.55;
  }
  .dm-shell-bottom{
    bottom:0;
    border-radius: 6% 6% 50% 50% / 18% 18% 100% 100%;
    animation-name: dmShellBottomIn;
    animation-timing-function: ease;
    animation-fill-mode: forwards;
  }
  .dm-shell-bottom::before{
    content:"";
    position:absolute;
    left:6%;
    right:6%;
    top:-5px;
    height:12px;
    background: repeating-radial-gradient(circle at 0 0, var(--dm-shell-dark) 0 3px, transparent 3px 15px);
    opacity:.55;
  }
 
  .dm-cream{
    position:absolute;
    left:9%;
    right:9%;
    top:50%;
    height:clamp(30px,5.5vw,46px);
    margin-top:calc(clamp(30px,5.5vw,46px) / -2);
    background: linear-gradient(160deg, #ffffff 0%, var(--dm-cream) 35%, var(--dm-cream) 70%, rgba(255,255,255,.4) 100%);
    border-radius: 45%;

<script>
(function(){

  /* ======================================================
     CONFIG -- ТЕКСТИ, КОЛЬОРИ ТА ФОТО РОБІТ ТУТ
     ====================================================== */

    colors: {
      bgGradientStart : "#f8efe6", /* ЗМІНИТИ фон секції */

      textDark        : "#332420", /* ЗМІНИТИ колір заголовка */
      textLight       : "#7a675f", /* ЗМІНИТИ колір підзаголовка */
      badgeText       : "#9c7a4e"  /* ЗМІНИТИ колір тексту бейджа */
    },

    texts: {
      badgeText : "Наші роботи",                                   /* ЗМІНИТИ текст бейджа */
      titleHtml : "Кожен макарон -- <em>маленький</em> витвір",     /* ЗМІНИТИ заголовок секції */
      subtitle  : "Кілька прикладів наших робіт -- від класичних смаків до святкових наборів на замовлення." /* ЗМІНИТИ підзаголовок */
    },

    /* Список робіт: для кожної картки встав своє посилання на фото (завантаж фото в Tilda або на ibb.co)
       і за бажанням підпис, який з'явиться при наведенні (на телефоні -- завжди видно) */
    items: [
      { imageUrl: "https://i.ibb.co/xqW1kwRs/size-3-4-202607112211-1.jpg", alt: "Полуниця-мак", caption: "Полуниця-мак / Легка кислинка та хрумкий мак", href: "https://www.instagram.com/p/DTQGC8ngvmz/?igsh=MW54OGdhNXR2b3h1Mg==" },
      { imageUrl: "https://i.ibb.co/k6vvD8gc/Remove-icon-from-top-202607112210.jpg", alt: "Макарон Снікерс", caption: "Макарон Снікерс / Шоколадний крем, солона карамель, арахіс", href: "https://www.instagram.com/reel/DTqGDMwAlvR/?igsh=Z3J2cTZ2N2w0cWx2" },

      { imageUrl: "https://i.ibb.co/fzrxpdPf/Remove-icon-from-top-202607112212.jpg", alt: "Шоколад та солона карамель", caption: "Шоколад та солона карамель", href: "https://www.instagram.com/p/DTOIuNwgJ_Q/?igsh=MWl3M2lkc285a2o4eg==" },

    ]
  };

  /* ====================== КІНЕЦЬ CONFIG ====================== */


  var root = document.getElementById('dmgRoot');
  if(!root) return;

  var c = CONFIG.colors;
  root.style.setProperty('--dmg-bg1', c.bgGradientStart);
  root.style.setProperty('--dmg-bg2', c.bgGradientEnd);
  root.style.setProperty('--dmg-shell', c.shellColor);
  root.style.setProperty('--dmg-accent', c.accentColor);
  root.style.setProperty('--dmg-text-dark', c.textDark);
  root.style.setProperty('--dmg-text-light', c.textLight);
  root.style.setProperty('--dmg-badge-text', c.badgeText);

  var t = CONFIG.texts;
  document.getElementById('dmgBadgeText').textContent = t.badgeText;
  document.getElementById('dmgTitle').innerHTML = t.titleHtml;
  document.getElementById('dmgSubtitle').textContent = t.subtitle;

  var grid = document.getElementById('dmgGrid');
  CONFIG.items.forEach(function(item){
    if(!item.imageUrl) return; /* картка без вставленого фото просто не показується */

    var wrap = document.createElement(item.href ? 'a' : 'div');
    wrap.className = 'dmg-item';
    if(item.href){
      wrap.setAttribute('href', item.href);
      wrap.setAttribute('target', '_blank');
      wrap.setAttribute('rel', 'noopener');
    }

    var card = document.createElement('div');
    card.className = 'dmg-card';

    var img = document.createElement('img');
    img.src = item.imageUrl;
    img.alt = item.alt || '';
    img.loading = 'lazy';
    card.appendChild(img);
    wrap.appendChild(card);

    if(item.caption){
      var cap = document.createElement('div');
      cap.className = 'dmg-caption';       /* ЗМІНЕНО: підпис тепер звичайний текст під фото -- завжди видно, нічого не обрізається */
      cap.textContent = item.caption;
      wrap.appendChild(cap);
    }

    grid.appendChild(wrap);
  });

})();
</script>

      btnBg           : "#332420", /* ЗМІНИТИ фон кнопки замовлення */
      btnText         : "#fbf3ec"  /* ЗМІНИТИ колір тексту кнопки */
    },

    texts: {

      titleHtml : "Скільки коштують <em>макарони</em>",                 /* ЗМІНИТИ заголовок */
      subtitle  : "Ціни діють з 09.02.2026. Обирай зручну кількість.", /* ЗМІНИТИ підзаголовок */
      btnText   : "Замовити в Instagram" /* ЗМІНИТИ текст кнопки */
    },

    btnUrl: "https://www.instagram.com/dr.macaron_varshavskiy?igsh=a2t6aW03am5xbDFp", /* ЗМІНИТИ посилання кнопки */

    /* Ряди прайсу: qty -- кількість штук, price -- ціна в грн.
       highlight: true -- виділити картку темним фоном (наприклад найпопулярніший набір)
       tag -- напис-бейджик над карткою (можна лишити "") */
    items: [
      { qty: 4,  price: 260,  highlight:false, tag:"" },
      { qty: 6,  price: 390,  highlight:false, tag:"" },
      { qty: 8,  price: 520,  highlight:false, tag:"" },
      { qty: 10, price: 650,  highlight:true,  tag:"Популярний вибір" },
      { qty: 12, price: 780,  highlight:false, tag:"" },
      { qty: 16, price: 1040, highlight:false, tag:"" }
    ]
  };

  /* ====================== КІНЕЦЬ CONFIG ====================== */


  var root = document.getElementById('dmpRoot');
  if(!root) return;

  var c = CONFIG.colors;
  root.style.setProperty('--dmp-bg1', c.bgGradientStart);
  root.style.setProperty('--dmp-bg2', c.bgGradientEnd);
  root.style.setProperty('--dmp-shell', c.shellColor);
  root.style.setProperty('--dmp-accent', c.accentColor);
  root.style.setProperty('--dmp-text-dark', c.textDark);
  root.style.setProperty('--dmp-text-light', c.textLight);
  root.style.setProperty('--dmp-badge-text', c.badgeText);
  root.style.setProperty('--dmp-highlight-bg', c.highlightBg);
  root.style.setProperty('--dmp-highlight-text', c.highlightText);
  root.style.setProperty('--dmp-btn-bg', c.btnBg);
  root.style.setProperty('--dmp-btn-text', c.btnText);

  var t = CONFIG.texts;
  document.getElementById('dmpBadgeText').textContent = t.badgeText;
  document.getElementById('dmpTitle').innerHTML = t.titleHtml;
  document.getElementById('dmpSubtitle').textContent = t.subtitle;
  document.getElementById('dmpNote').textContent = t.note;

  var btn = document.getElementById('dmpBtn');
  btn.textContent = t.btnText;
  btn.setAttribute('href', CONFIG.btnUrl);

  var grid = document.getElementById('dmpGrid');
  CONFIG.items.forEach(function(item){
    var card = document.createElement('div');
    card.className = 'dmp-card' + (item.highlight ? ' dmp-highlight' : '');

    if(item.tag){
      var tag = document.createElement('div');
      tag.className = 'dmp-card-tag';
      tag.textContent = item.tag;
      card.appendChild(tag);
    }

    var qty = document.createElement('div');
    qty.className = 'dmp-card-qty';
    qty.textContent = item.qty + ' шт';
    card.appendChild(qty);

    var price = document.createElement('div');
    price.className = 'dmp-card-price';
    price.textContent = item.price + ' грн';
    card.appendChild(price);

    var per = document.createElement('div');
    per.className = 'dmp-card-per';
    per.textContent = '~' + Math.round(item.price / item.qty) + ' грн / шт';
    card.appendChild(per);

    grid.appendChild(card);
  });

})();
</script>

  root.style.setProperty('--dmr-text-light', c.textLight);
  root.style.setProperty('--dmr-badge-text', c.badgeText);
  root.style.setProperty('--dmr-arrow-bg', c.arrowBg);
  root.style.setProperty('--dmr-arrow-text', c.arrowText);

  var t = CONFIG.texts;
  document.getElementById('dmrBadgeText').textContent = t.badgeText;
  document.getElementById('dmrTitle').innerHTML = t.titleHtml;
  document.getElementById('dmrSubtitle').textContent = t.subtitle;

  var PLAY_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M7 4.8v14.4c0 .8.9 1.3 1.6.9l11.2-7.2c.6-.4.6-1.4 0-1.8L8.6 3.9C7.9 3.5 7 4 7 4.8Z"/></svg>';

  var items = CONFIG.items.filter(function(item){ return !!item.thumbUrl; });

  var track = document.getElementById('dmrTrack');
  items.forEach(function(item, index){
    var card = document.createElement('button');
    card.type = 'button';
    card.className = 'dmr-card';
    card.setAttribute('data-index', index);

    var img = document.createElement('img');
    img.src = item.thumbUrl;
    img.alt = '';
    img.loading = 'lazy';
    card.appendChild(img);

    if(item.type === 'video'){
      var play = document.createElement('span');
      play.className = 'dmr-play';
      play.innerHTML = PLAY_SVG;
      card.appendChild(play);
    }

    card.addEventListener('click', function(){ openLightbox(index); });
    track.appendChild(card);
  });

  var arrowLeft = document.getElementById('dmrArrowLeft');
  var arrowRight = document.getElementById('dmrArrowRight');
  function scrollByCard(dir){
    var card = track.querySelector('.dmr-card');
    var step = card ? (card.getBoundingClientRect().width + 16) * 3 : 400;
    track.scrollBy({ left: dir * step, behavior:'smooth' });
  }
  arrowLeft.addEventListener('click', function(){ scrollByCard(-1); });
  arrowRight.addEventListener('click', function(){ scrollByCard(1); });

  /* ======================================================
     ЛАЙТБОКС -- показ фото/відео на весь екран
     ====================================================== */
  var lightbox = document.getElementById('dmrLightbox');
  var lbImg = document.getElementById('dmrLbImg');
  var lbVideo = document.getElementById('dmrLbVideo');
  var lbVideoWrap = document.getElementById('dmrLbVideoWrap');
  var lbClose = document.getElementById('dmrLbClose');
  var lbPrev = document.getElementById('dmrLbPrev');
  var lbNext = document.getElementById('dmrLbNext');
  var currentIndex = 0;

  function toYouTubeEmbed(url){
    if(!url) return '';
    var id = '';
    var shortsMatch = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]+)/);
    var watchMatch = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
    var shortMatch = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
    if(shortsMatch) id = shortsMatch[1];
    else if(watchMatch) id = watchMatch[1];
    else if(shortMatch) id = shortMatch[1];
    else return url; /* якщо це вже інший формат (напр. embed) -- залишаємо як є */
    return 'https://www.youtube.com/embed/' + id + '?autoplay=1&playsinline=1';
  }

  function renderLightboxItem(){
    var item = items[currentIndex];
    if(item.type === 'video' && item.videoUrl){
      lbImg.style.display = 'none';
      lbVideoWrap.style.display = 'block';
      lbVideo.src = toYouTubeEmbed(item.videoUrl);
    } else {
      lbVideo.src = '';
      lbVideoWrap.style.display = 'none';
      lbImg.style.display = 'block';
      lbImg.src = item.thumbUrl;
    }
  }

  function openLightbox(index){
    currentIndex = index;
    renderLightboxItem();
    lightbox.classList.add('dmr-lb-open');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(){
    lbVideo.src = '';
    lightbox.classList.remove('dmr-lb-open');
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
  }
  function showRelative(dir){
    lbVideo.src = '';
    currentIndex = (currentIndex + dir + items.length) % items.length;
    renderLightboxItem();
  }

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', function(){ showRelative(-1); });
  lbNext.addEventListener('click', function(){ showRelative(1); });
  lightbox.addEventListener('click', function(e){
    if(e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', function(e){
    if(!lightbox.classList.contains('dmr-lb-open')) return;
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowLeft') showRelative(-1);
    if(e.key === 'ArrowRight') showRelative(1);
  });

})();
</script>

    a.setAttribute('href', item.url);
    navWrap.appendChild(a);
  });

  document.getElementById('dmfContactTitle').textContent = CONFIG.contactTitle;
  var contactWrap = document.getElementById('dmfContact');
  CONFIG.contact.forEach(function(item){
    var el = item.url ? document.createElement('a') : document.createElement('span');
    el.textContent = item.text;
    if(item.url) el.setAttribute('href', item.url);
    contactWrap.appendChild(el);
  });

  document.getElementById('dmfCtaTitle').textContent = CONFIG.cta.title;
  document.getElementById('dmfCtaText').textContent = CONFIG.cta.text;
  var ctaBtn = document.getElementById('dmfBtn');
  ctaBtn.textContent = CONFIG.cta.btnText;
  ctaBtn.setAttribute('href', CONFIG.cta.btnUrl);

  document.getElementById('dmfCopyright').textContent = CONFIG.copyright;
  document.getElementById('dmfMadeby').textContent = CONFIG.madeby || '';

})();
</script>

<div id="dmtRoot" class="dmt-root">
  <button class="dmt-btn" id="dmtBtn" aria-label="Прокрутити вгору">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 19V5M12 5l-6 6M12 5l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<style>
  #dmtRoot{
    --dmt-bg:#332420;
    --dmt-icon:#fbf3ec;
    --dmt-hover-bg:#a4506c;

    position:relative;
    box-sizing:border-box;
  }
  #dmtRoot *{ box-sizing:border-box; }

  .dmt-btn{
    position:fixed;
    right: clamp(16px,3vw,32px);
    bottom: clamp(16px,3vw,32px);
    z-index:800;
    width:48px;
    height:48px;
    border-radius:50%;
    border:none;
    background: var(--dmt-bg);
    color: var(--dmt-icon);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow: 0 14px 28px rgba(51,36,32,.28);
    opacity:0;
    visibility:hidden;
    transform: translateY(10px);
    transition: opacity .3s ease, transform .3s ease, visibility 0s linear .3s, background .25s ease;
  }
  .dmt-btn.dmt-visible{
    opacity:1;
    visibility:visible;
    transform: translateY(0);
    transition: opacity .3s ease, transform .3s ease, visibility 0s, background .25s ease;
  }
  .dmt-btn:hover{ background: var(--dmt-hover-bg); }
  .dmt-btn svg{ width:20px; height:20px; }

  @media (max-width: 480px){
    .dmt-btn{ width:42px; height:42px; right:14px; bottom:14px; }
    .dmt-btn svg{ width:17px; height:17px; }
  }

  @media (prefers-reduced-motion: reduce){
    .dmt-btn{ transition:none; }
  }
</style>

<script>
(function(){

  /* ======================================================
     CONFIG
     ====================================================== */
  var CONFIG = {
    colors: {
      bg      : "#332420", /* ЗМІНИТИ фон кнопки */
      icon    : "#fbf3ec", /* ЗМІНИТИ колір стрілки */
      hoverBg : "#a4506c"  /* ЗМІНИТИ фон кнопки при наведенні */
    },
    showAfterPx : 400 /* ЗМІНИТИ -- після скількох пікселів прокрутки з'являється кнопка */
  };
  /* ====================== КІНЕЦЬ CONFIG ====================== */

  var root = document.getElementById('dmtRoot');
  if(!root) return;

  var c = CONFIG.colors;
  root.style.setProperty('--dmt-bg', c.bg);
  root.style.setProperty('--dmt-icon', c.icon);
  root.style.setProperty('--dmt-hover-bg', c.hoverBg);

  var btn = document.getElementById('dmtBtn');

  function toggleVisibility(){
    if(window.scrollY > CONFIG.showAfterPx){ btn.classList.add('dmt-visible'); }
    else{ btn.classList.remove('dmt-visible'); }
  }
  toggleVisibility();
  window.addEventListener('scroll', toggleVisibility, { passive:true });

  btn.addEventListener('click', function(){
    window.scrollTo({ top:0, behavior:'smooth' });
  });

})();
</script>


  <!-- Блок 11 -->

<style>
  html{
    scroll-behavior:smooth; /* плавний скрол для сучасних браузерів (Chrome, Firefox, Edge, Android) */
  }
</style>

<script>
(function(){

  /* ======================================================
     CONFIG
     ====================================================== */
  var CONFIG = {
    headerSelector : "#dmhHeader", /* ЗМІНИТИ, якщо id фіксованої шапки інший -- потрібен, щоб якір не ховався під нею */
    fallbackOffset : 90            /* ЗМІНИТИ -- відступ (px), якщо шапки на сторінці немає взагалі */
  };
  /* ====================== КІНЕЦЬ CONFIG ====================== */

  function getOffset(){
    var header = document.querySelector(CONFIG.headerSelector);
    return header ? header.offsetHeight + 12 : CONFIG.fallbackOffset;
  }

  /* Власний обробник кліків по якорях -- працює навіть там, де CSS scroll-behavior:smooth
     не підтримується (Safari) або поламаний сторонніми скриптами Тільди */
  document.addEventListener('click', function(e){
    var link = e.target.closest ? e.target.closest('a[href^="#"]') : null;
    if(!link) return;

    var id = link.getAttribute('href');
    if(!id || id === '#' || id.length < 2) return;

    var target = document.querySelector(id);
    if(!target) return;

    e.preventDefault();
    var top = target.getBoundingClientRect().top + window.pageYOffset - getOffset();
    window.scrollTo({ top: top, behavior:'smooth' });

    if(history.pushState){ history.pushState(null, '', id); }
  });

})();
</script>
